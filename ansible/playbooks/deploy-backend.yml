---
- name: Deploy Payment Form Backend
  hosts: backend
  become: yes
  vars_files:
    - ../vars/common.yml
    - ../vars/{{ environment | default('dev') }}.yml
  
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install required packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - python3-pip
          - git
        state: present

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Install Docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: Start and enable Docker
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Install Docker SDK for Python
      pip:
        name:
          - docker
          - docker-compose
        state: present

    - name: Create application directory
      file:
        path: "{{ app_base_directory }}"
        state: directory
        owner: ubuntu
        group: docker
        mode: '0755'

    - name: Clone backend repository
      git:
        repo: "{{ backend_repo_url }}"
        dest: "{{ app_base_directory }}/backend"
        version: "{{ backend_branch | default('main') }}"
        force: yes
      when: backend_repo_url is defined

    - name: Create environment file
      template:
        src: backend.env.j2
        dest: "{{ app_base_directory }}/backend/.env"
        owner: ubuntu
        mode: '0600'
      when: backend_env_vars is defined

    - name: Login to ECR
      shell: |
        aws ecr get-login-password --region {{ aws_region }} | \
        docker login --username AWS --password-stdin {{ ecr_registry_url }}
      when: 
        - environment != "dev"
        - ecr_registry_url is defined
      become_user: ubuntu

    - name: Start backend with Docker Compose
      community.docker.docker_compose:
        project_src: "{{ app_base_directory }}/backend"
        files:
          - docker-compose.yml
        pull: yes
        state: present
      become_user: ubuntu
      environment:
        COMPOSE_PROJECT_NAME: paymentform-backend

    - name: Wait for backend health check
      uri:
        url: "http://localhost:{{ backend_port | default(3000) }}/health"
        method: GET
        status_code: 200
      register: health_check
      until: health_check.status == 200
      retries: 30
      delay: 10
      ignore_errors: yes